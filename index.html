<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morozov Ultra Max | All-in-One</title>
    <!-- SDK -->
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-storage-compat.js"></script>

    <style>
        :root { --bg: #0e1621; --side: #17212b; --active: #2b5278; --accent: #2481cc; --text: #fff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* Auth */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--side); padding: 40px; border-radius: 20px; width: 300px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: #242f3d; color: #fff; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        button:hover { opacity: 0.8; }

        /* Sidebar */
        #sidebar { width: 320px; background: var(--side); border-right: 1px solid #000; display: flex; flex-direction: column; }
        .user-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #0e1621; display: flex; justify-content: space-between; align-items: center; }
        .user-item:hover { background: var(--active); }
        .online-dot { width: 10px; height: 10px; background: #4caf50; border-radius: 50%; }

        /* Chat */
        #chat-area { flex: 1; display: flex; flex-direction: column; position: relative; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #0e1621 url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 12px; position: relative; font-size: 15px; }
        .sent { align-self: flex-end; background: var(--active); border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #182533; border-bottom-left-radius: 2px; }
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 5px; }

        /* Video Call Windows */
        #video-container { position: absolute; top: 10px; right: 10px; display: flex; gap: 10px; z-index: 100; }
        .video-box { width: 150px; height: 110px; background: #000; border-radius: 10px; overflow: hidden; border: 2px solid var(--accent); }

        .header { padding: 15px; background: var(--side); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2>Morozov Ultra Max</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Пароль">
            <button onclick="authAction('login')">Войти</button>
            <p style="cursor:pointer; font-size: 12px; margin-top: 10px;" onclick="authAction('reg')">Нет аккаунта? Создать</p>
        </div>
    </div>

    <div id="sidebar">
        <div class="header">
            <b id="my-name">Профиль</b>
            <button onclick="auth.signOut()" style="width: auto; padding: 5px 10px; background: #e53935;">Выйти</button>
        </div>
        <div style="padding: 10px;"><input type="text" id="find-user" placeholder="Найти по Email..." onkeypress="if(event.key==='Enter') searchUser()"></div>
        <div id="user-list"></div>
    </div>

    <div id="chat-area">
        <div class="header">
            <span id="chat-title">Выберите чат</span>
            <button id="call-btn" class="hidden" onclick="startCall()" style="width:auto">📞 Позвонить</button>
        </div>

        <div id="video-container">
            <div id="local-video" class="video-box hidden"></div>
            <div id="remote-video" class="video-box hidden"></div>
        </div>

        <div id="messages"></div>

        <div class="header">
            <input type="file" id="file-input" class="hidden" onchange="uploadFile(this)">
            <button onclick="document.getElementById('file-input').click()" style="width:auto">📎</button>
            <input type="text" id="m-text" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="width:auto">➡️</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDutfZZER5BasyHr68zwLCx7B5k1adFhik",
            authDomain: "morozov-ultra.firebaseapp.com",
            projectId: "morozov-ultra",
            storageBucket: "morozov-ultra.firebasestorage.app",
            messagingSenderId: "255345933856",
            appId: "1:255345933856:web:5b8d1b93696f36eb5d4645"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(), auth = firebase.auth(), storage = firebase.storage();

        const AGORA_APP_ID = "ТВОЙ_AGORA_APP_ID"; // <--- ВСТАВЬ СЮДА
        let currentUID, activeChatID, targetUID;

        // --- AUTH ---
        async function authAction(t) {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            try {
                if(t === 'reg') {
                    const r = await auth.createUserWithEmailAndPassword(e, p);
                    await db.collection('users').doc(r.user.uid).set({ email: e, name: e.split('@')[0], online: true });
                } else await auth.signInWithEmailAndPassword(e, p);
            } catch(err) { alert(err.message); }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                currentUID = user.uid;
                document.getElementById('auth-screen').classList.add('hidden');
                db.collection('users').doc(currentUID).update({ online: true });
                loadContacts();
            } else document.getElementById('auth-screen').classList.remove('hidden');
        });

        // --- MESSAGES & FILES ---
        async function sendMsg(url = null) {
            const text = document.getElementById('m-text').value;
            if((!text && !url) || !activeChatID) return;
            await db.collection('chats').doc(activeChatID).collection('messages').add({
                text: text, file: url, sender: currentUID, time: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('m-text').value = "";
        }

        async function uploadFile(el) {
            const file = el.files[0];
            const ref = storage.ref(`uploads/${Date.now()}_${file.name}`);
            await ref.put(file);
            const url = await ref.getDownloadURL();
            sendMsg(url);
        }

        function openChat(user) {
            targetUID = user.id;
            activeChatID = [currentUID, targetUID].sort().join('_');
            document.getElementById('chat-title').innerText = user.name;
            document.getElementById('call-btn').classList.remove('hidden');
            listenMsgs();
        }

        function listenMsgs() {
            db.collection('chats').doc(activeChatID).collection('messages').orderBy('time', 'asc').onSnapshot(snap => {
                const box = document.getElementById('messages');
                box.innerHTML = "";
                snap.forEach(doc => {
                    const m = doc.data();
                    const div = document.createElement('div');
                    div.className = `msg ${m.sender === currentUID ? 'sent' : 'received'}`;
                    div.innerHTML = m.file ? `<img src="${m.file}">` : "";
                    div.innerHTML += `<div>${m.text}</div>`;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        // --- SEARCH & CONTACTS ---
        async function searchUser() {
            const email = document.getElementById('find-user').value;
            const snap = await db.collection('users').where("email", "==", email).get();
            if(!snap.empty) openChat({id: snap.docs[0].id, ...snap.docs[0].data()});
        }

        function loadContacts() {
            db.collection('users').onSnapshot(snap => {
                const list = document.getElementById('user-list');
                list.innerHTML = "";
                snap.forEach(doc => {
                    if(doc.id === currentUID) { document.getElementById('my-name').innerText = doc.data().name; return; }
                    const u = doc.data();
                    const div = document.createElement('div');
                    div.className = "user-item";
                    div.innerHTML = `<span>${u.name}</span> ${u.online ? '<div class="online-dot"></div>' : ''}`;
                    div.onclick = () => openChat({id: doc.id, ...u});
                    list.appendChild(div);
                });
            });
        }

        // --- AGORA CALLS ---
        let agoraClient = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        async function startCall() {
            document.getElementById('local-video').classList.remove('hidden');
            const [audio, video] = await Promise.all([
                AgoraRTC.createMicrophoneAudioTrack(), AgoraRTC.createCameraVideoTrack()
            ]);
            await agoraClient.join(AGORA_APP_ID, activeChatID, null, null);
            video.play("local-video");
            await agoraClient.publish([audio, video]);
        }
        agoraClient.on("user-published", async (user, type) => {
            await agoraClient.subscribe(user, type);
            if(type === 'video') {
                document.getElementById('remote-video').classList.remove('hidden');
                user.videoTrack.play("remote-video");
            }
        });
    </script>
</body>
</html>
