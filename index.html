<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morozovvideo Ultra Max</title>
    <!-- SDK Подключение (v9 compat для стабильности) -->
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>

    <style>
        :root { --primary: #00AEFC; --bg: #111111; --card: #222222; --text: #FFFFFF; --danger: #FF414D; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        button { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 100px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        input { padding: 12px 20px; border-radius: 100px; border: 1px solid #333; background: #1a1a1a; color: white; outline: none; margin: 5px 0; }
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--card); padding: 40px; border-radius: 30px; text-align: center; width: 300px; }
        #sidebar { width: 300px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; }
        .user-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .user-item:hover { background: #262626; }
        .online-dot { width: 10px; height: 10px; background: #36B37E; border-radius: 50%; }
        #chat-area { flex: 1; display: flex; flex-direction: column; position: relative; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 18px; }
        .sent { align-self: flex-end; background: var(--primary); }
        .received { align-self: flex-start; background: var(--card); }
        #video-grid { position: absolute; top: 70px; right: 20px; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        .video-box { width: 220px; height: 160px; background: #000; border-radius: 20px; overflow: hidden; border: 2px solid var(--primary); }
        #call-popup { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); padding: 20px; border-radius: 25px; z-index: 3000; display: none; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { padding: 15px; background: #1a1a1a; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2 style="color:var(--primary); margin-bottom: 20px;">Morozovvideo</h2>
            <input type="email" id="email" placeholder="Email" style="width: 90%;">
            <input type="password" id="pass" placeholder="Пароль" style="width: 90%;">
            <button onclick="authAction('login')" style="width: 100%; margin-top: 15px;">ВОЙТИ</button>
            <p style="font-size: 11px; cursor: pointer; margin-top: 10px;" onclick="authAction('reg')">Регистрация</p>
        </div>
    </div>

    <div id="call-popup">
        <p id="caller-info" style="margin: 0 0 15px 0; font-weight: bold;"></p>
        <button onclick="answerCall()" style="background: #36B37E;">ОТВЕТИТЬ</button>
        <button onclick="declineCall()" style="background: var(--danger); margin-left: 10px;">СБРОСИТЬ</button>
    </div>

    <div id="sidebar">
        <div class="header"><b>Контакты</b></div>
        <div id="user-list"></div>
    </div>

    <div id="chat-area">
        <div class="header">
            <span id="chat-title">Выберите друга</span>
            <div id="chat-btns" class="hidden">
                <button onclick="callUser()">📞 ПОЗВОНИТЬ</button>
                <button id="end-call-btn" class="hidden" style="background: var(--danger);" onclick="leaveCall()">🔴 СБРОСИТЬ</button>
            </div>
        </div>
        <div id="video-grid">
            <div id="local-video" class="video-box hidden"></div>
            <div id="remote-video" class="video-box hidden"></div>
        </div>
        <div id="messages"></div>
        <div class="header" style="border-top: 1px solid #333;">
            <input type="text" id="m-input" placeholder="Введите сообщение..." style="flex: 1; margin-right: 10px;">
            <button onclick="sendText()">➡️</button>
        </div>
    </div>

    <script>
        // ИСПРАВЛЕННЫЙ КОНФИГ (apiKey проверен по твоему скриншоту)
        const firebaseConfig = {
            apiKey: "AIzaSyDutfZZER5BasyHr68zwLCx7B5k1adFhik",
            authDomain: "morozov-ultra.firebaseapp.com",
            databaseURL: "https://morozov-ultra-default-rtdb.firebaseio.com",
            projectId: "morozov-ultra",
            storageBucket: "morozov-ultra.firebasestorage.app",
            messagingSenderId: "255345933856",
            appId: "1:255345933856:web:5b8d1b93696f36eb5d4645",
            measurementId: "G-65N6XN2L0E"
        };
        const AGORA_ID = "6bde9afb487c403fb1115ae7c7210e4b";

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(), auth = firebase.auth();
        const agoraClient = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });

        let myId, activeChat, targetId, localTracks = [];

        async function authAction(mode) {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            try {
                if(mode === 'reg') {
                    const r = await auth.createUserWithEmailAndPassword(e, p);
                    await db.collection('users').doc(r.user.uid).set({ email: e, name: e.split('@')[0], online: true });
                } else {
                    await auth.signInWithEmailAndPassword(e, p);
                }
            } catch(err) { 
                console.error("Ошибка Firebase:", err.code, err.message);
                alert("Ошибка: " + err.message); 
            }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                myId = user.uid;
                document.getElementById('auth-screen').classList.add('hidden');
                db.collection('users').doc(myId).update({ online: true });
                loadUsers();
                listenForCalls();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
            }
        });

        function loadUsers() {
            db.collection('users').onSnapshot(snap => {
                const list = document.getElementById('user-list'); list.innerHTML = "";
                snap.forEach(doc => {
                    if(doc.id === myId) return;
                    const u = doc.data();
                    const div = document.createElement('div');
                    div.className = "user-item";
                    div.innerHTML = `<span>${u.name}</span> ${u.online ? '<div class="online-dot"></div>' : ''}`;
                    div.onclick = () => startChat(doc.id, u.name);
                    list.appendChild(div);
                });
            });
        }

        function startChat(id, name) {
            targetId = id;
            activeChat = [myId, targetId].sort().join('_');
            document.getElementById('chat-title').innerText = name;
            document.getElementById('chat-btns').classList.remove('hidden');
            loadMsgs();
        }

        async function sendText() {
            const val = document.getElementById('m-input').value;
            if(!val || !activeChat) return;
            await db.collection('chats').doc(activeChat).collection('messages').add({
                text: val, sender: myId, time: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('m-input').value = "";
        }

        function loadMsgs() {
            db.collection('chats').doc(activeChat).collection('messages').orderBy('time').onSnapshot(snap => {
                const box = document.getElementById('messages'); box.innerHTML = "";
                snap.forEach(doc => {
                    const m = doc.data();
                    const div = document.createElement('div');
                    div.className = `msg ${m.sender === myId ? 'sent' : 'received'}`;
                    div.innerText = m.text;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function listenForCalls() {
            db.collection('calls').doc(myId).onSnapshot(doc => {
                const data = doc.data();
                if(data && data.status === 'inviting') {
                    document.getElementById('caller-info').innerText = `Звонит ${data.callerName}`;
                    document.getElementById('call-popup').style.display = 'block';
                    activeChat = data.channel;
                } else if(!data) {
                    document.getElementById('call-popup').style.display = 'none';
                }
            });
        }

        async function callUser() {
            const myName = auth.currentUser.email.split('@')[0];
            await db.collection('calls').doc(targetId).set({
                callerName: myName, channel: activeChat, status: 'inviting'
            });
            joinAgora();
        }

        async function answerCall() {
            document.getElementById('call-popup').style.display = 'none';
            await db.collection('calls').doc(myId).update({ status: 'accepted' });
            joinAgora();
        }

        async function declineCall() {
            await db.collection('calls').doc(myId).delete();
        }

        async function joinAgora() {
            document.getElementById('local-video').classList.remove('hidden');
            document.getElementById('end-call-btn').classList.remove('hidden');
            const [audio, video] = await Promise.all([
                AgoraRTC.createMicrophoneAudioTrack(),
                AgoraRTC.createCameraVideoTrack()
            ]);
            localTracks = [audio, video];
            await agoraClient.join(AGORA_ID, activeChat, null, null);
            video.play("local-video");
            await agoraClient.publish(localTracks);
        }

        agoraClient.on("user-published", async (user, type) => {
            await agoraClient.subscribe(user, type);
            if(type === 'video') {
                document.getElementById('remote-video').classList.remove('hidden');
                user.videoTrack.play("remote-video");
            }
            if(type === 'audio') user.audioTrack.play();
        });

        async function leaveCall() {
            localTracks.forEach(t => { t.stop(); t.close(); });
            await agoraClient.leave();
            await db.collection('calls').doc(targetId).delete().catch(()=>{});
            await db.collection('calls').doc(myId).delete().catch(()=>{});
            location.reload();
        }
    </script>
</body>
</html>
