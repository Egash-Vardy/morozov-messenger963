<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morozov Ultra Messenger</title>
    
    <!-- Подключаем библиотеки -->
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --tg-bg: #0f1721;
            --tg-panel: #17212b;
            --tg-sent: #2b5278;
            --tg-text: #ffffff;
            --tg-button: #2481cc;
            --tg-danger: #e53935;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--tg-bg);
            color: var(--tg-text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Шапка со звонками */
        #call-bar {
            background: var(--tg-panel);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #000;
        }

        #video-grid {
            display: flex;
            gap: 10px;
            position: absolute;
            top: 70px;
            right: 20px;
            z-index: 10;
        }

        .video-window {
            width: 200px;
            height: 150px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--tg-button);
        }

        /* Чат */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .msg-in {
            align-self: flex-start;
            background: var(--tg-panel);
        }

        .msg-out {
            align-self: flex-end;
            background: var(--tg-sent);
        }

        /* Поле ввода */
        #input-area {
            background: var(--tg-panel);
            padding: 15px;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: #242f3d;
            border: none;
            padding: 12px;
            border-radius: 8px;
            color: white;
            outline: none;
        }

        button {
            background: var(--tg-button);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { opacity: 0.8; }
        .btn-end { background: var(--tg-danger); }

        /* Скрыть видео по умолчанию */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="call-bar">
        <strong>Morozov Ultra</strong>
        <div>
            <button id="start-btn" onclick="startCall()">📞 Позвонить</button>
            <button id="end-btn" class="btn-end hidden" onclick="leaveCall()">🔴 Сбросить</button>
        </div>
    </div>

    <div id="video-grid">
        <div id="local-player" class="video-window hidden"></div>
        <div id="remote-player" class="video-window hidden"></div>
    </div>

    <div id="chat-container">
        <!-- Сообщения будут тут -->
    </div>

    <div id="input-area">
        <input type="text" id="msgInput" placeholder="Написать сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">ОТПРАВИТЬ</button>
    </div>

    <script>
        // --- 1. НАСТРОЙКИ (ВСТАВЬ СВОИ ДАННЫЕ) ---
        const firebaseConfig = {
            apiKey: "AIzaSyDutfZZER5BasyHr68zwLCx7B5k1adFhik",
            authDomain: "morozov-ultra.firebaseapp.com",
            databaseURL: "https://morozov-ultra-default-rtdb.firebaseio.com",
            projectId: "morozov-ultra",
            storageBucket: "morozov-ultra.firebasestorage.app",
            messagingSenderId: "255345933856",
            appId: "1:255345933856:web:5b8d1b93696f36eb5d4645"
        };

        const AGORA_APP_ID = "ВСТАВЬ_СЮДА_СВОЙ_AGORA_APP_ID"; 

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- 2. ЛОГИКА ЧАТА ---
        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;

            await db.collection("messages").add({
                text: text,
                sender: "me", // В будущем тут будет ID пользователя
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            input.value = "";
        }

        // Слушаем новые сообщения
        db.collection("messages").orderBy("createdAt", "asc")
            .onSnapshot(snapshot => {
                const container = document.getElementById('chat-container');
                container.innerHTML = "";
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const msgDiv = document.createElement('div');
                    msgDiv.classList.add('message');
                    msgDiv.classList.add(data.sender === "me" ? 'msg-out' : 'msg-in');
                    msgDiv.innerText = data.text;
                    container.appendChild(msgDiv);
                });
                container.scrollTop = container.scrollHeight;
            });

        // --- 3. ЛОГИКА ЗВОНКОВ (AGORA) ---
        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = { videoTrack: null, audioTrack: null };

        async function startCall() {
            try {
                // Подготовка интерфейса
                document.getElementById('start-btn').classList.add('hidden');
                document.getElementById('end-btn').classList.remove('hidden');
                document.getElementById('local-player').classList.remove('hidden');

                const channel = "global_room";
                // ВАЖНО: В консоли Agora выключи "App Certificate" для тестов, чтобы token был null
                const token = null; 

                [uid, localTracks.audioTrack, localTracks.videoTrack] = await Promise.all([
                    client.join(AGORA_APP_ID, channel, token, null),
                    AgoraRTC.createMicrophoneAudioTrack(),
                    AgoraRTC.createCameraVideoTrack()
                ]);

                localTracks.videoTrack.play("local-player");
                await client.publish(Object.values(localTracks));
                
                alert("Вы вошли в канал: " + channel);
            } catch (e) {
                console.error(e);
                alert("Ошибка при звонке. Проверьте камеру и App ID.");
            }
        }

        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === "video") {
                document.getElementById('remote-player').classList.remove('hidden');
                user.videoTrack.play("remote-player");
            }
            if (mediaType === "audio") {
                user.audioTrack.play();
            }
        });

        async function leaveCall() {
            for (let trackName in localTracks) {
                let track = localTracks[trackName];
                if (track) {
                    track.stop();
                    track.close();
                    localTracks[trackName] = null;
                }
            }
            await client.leave();
            document.getElementById('start-btn').classList.remove('hidden');
            document.getElementById('end-btn').classList.add('hidden');
            document.getElementById('local-player').classList.add('hidden');
            document.getElementById('remote-player').classList.add('hidden');
        }
    </script>
</body>
</html>
