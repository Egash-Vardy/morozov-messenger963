            '🎉', '🎊', '🎈', '🎁', '🎀', '🎗️', '🎭', '🎪', '🎨', '🎬',
            '👍', '👎', '👏', '🙌', '🤝', '🖐️', '✋', '🤲', '🤞', '🤟',
            '🚀', '✈️', '🛸', '🚁', '🛩️', '🚂', '🚃', '🚄', '🚅', '🚆',
            '⭐', '🌟', '✨', '⚡', '🔥', '💥', '💫', '🌈', '☀️', '🌙',
            '🍕', '🍔', '🍟', '🌭', '🍿', '🍦', '🍰', '🎂', '🍪', '🍩'
        ];

        function toggleEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            const btnRect = event.target.getBoundingClientRect();
            
            if (picker.classList.contains('active')) {
                picker.classList.remove('active');
            } else {
                if (picker.innerHTML === '') {
                    renderEmojiPicker();
                }
                picker.classList.add('active');
                picker.style.left = (btnRect.left - 30) + 'px';
            }
        }

        function renderEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            picker.innerHTML = STICKERS.map(emoji => `
                <div class="emoji-item" onclick="insertEmoji('${emoji}')" title="${emoji}">
                    ${emoji}
                </div>
            `).join('');
        }

        function insertEmoji(emoji) {
            const input = document.getElementById('messageInput');
            input.value += emoji;
            input.focus();
            document.getElementById('emojiPicker').classList.remove('active');
        }

        // ============= СТИКЕРЫ =============
        function openStickersPanel() {
            document.getElementById('stickersPanel').classList.add('active');
            if (document.getElementById('stickersContent').innerHTML === '') {
                renderStickers();
            }
        }

        function closeStickersPanel() {
            document.getElementById('stickersPanel').classList.remove('active');
        }

        function renderStickers() {
            const content = document.getElementById('stickersContent');
            content.innerHTML = STICKERS.map(sticker => `
                <div class="sticker-item" onclick="sendSticker('${sticker}')" title="Отправить">
                    ${sticker}
                </div>
            `).join('');
        }

        function sendSticker(sticker) {
            if (!appState.currentChat) {
                showToast('❌ Выберите чат', 'error');
                return;
            }

            const message = {
                id: 'msg_' + Date.now(),
                sender: appState.currentUser.id,
                text: sticker,
                timestamp: Date.now(),
                status: 'sent',
                isSticker: true
            };

            if (!appState.messages[appState.currentChat]) {
                appState.messages[appState.currentChat] = [];
            }

            appState.messages[appState.currentChat].push(message);
            appState.chats[appState.currentChat].lastMessageTime = Date.now();

            setTimeout(() => {
                message.status = 'read';
                saveData();
                loadMessages();
            }, Math.random() * 2000);

            saveData();
            loadMessages();
            loadChats();
            closeStickersPanel();
        }

        // ============= КОНТАКТЫ =============
        function openContactsPanel() {
            document.getElementById('contactsPanel').classList.add('active');
            loadContactsList();
        }

        function closeContactsPanel() {
            document.getElementById('contactsPanel').classList.remove('active');
        }

        function addContact() {
            const name = prompt('Введите имя контакта:');
            if (!name) return;

            const phone = prompt('Введите номер телефона (опционально):');
            
            if (!appState.contacts) {
                appState.contacts = {};
            }

            const contactId = 'contact_' + Date.now();
            appState.contacts[contactId] = {
                id: contactId,
                name: name,
                phone: phone || '',
                addedAt: Date.now()
            };

            saveData();
            loadContactsList();

            // Создаём новый чат с этим контактом
            const chatId = 'chat_' + Date.now();
            appState.chats[chatId] = {
                id: chatId,
                name: name,
                emoji: name[0].toUpperCase(),
                online: true,
                unread: 0,
                lastMessageTime: Date.now(),
                contactId: contactId
            };
            appState.messages[chatId] = [];

            saveData();
            loadChats();
        }

        function loadContactsList() {
            const container = document.getElementById('contactsList');
            if (!appState.contacts || Object.keys(appState.contacts).length === 0) {
                container.innerHTML = `
                    <div style="padding: 20px; text-align: center; color: var(--text-light);">
                        <p>Контактов нет</p>
                        <button class="modal-btn primary" onclick="addContact()" style="margin-top: 10px; width: 80%;">
                            ➕ Добавить контакт
                        </button>
                    </div>
                `;
                return;
            }

            const contactIds = Object.keys(appState.contacts).sort((a, b) => 
                appState.contacts[a].name.localeCompare(appState.contacts[b].name)
            );

            container.innerHTML = `
                <button class="modal-btn primary" onclick="addContact()" style="margin: 8px; width: calc(100% - 16px);">
                    ➕ Новый контакт
                </button>
            ` + contactIds.map(contactId => {
                const contact = appState.contacts[contactId];
                const initials = contact.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2) || contact.name[0].toUpperCase();
                
                return `
                    <div class="contact-item-full" onclick="selectChatWithContact('${contactId}')">
                        <div class="contact-avatar-full">${initials}</div>
                        <div class="contact-info-full">
                            <div class="contact-name-full">${escapeHtml(contact.name)}</div>
                            <div class="contact-status-full">${contact.phone || 'Нет телефона'}</div>
                        </div>
                        <div class="contact-action" onclick="event.stopPropagation(); deleteContact('${contactId}')">🗑️</div>
                    </div>
                `;
            }).join('');
        }

        function filterContacts(query) {
            if (!appState.contacts) return;

            const container = document.getElementById('contactsList');
            const filtered = Object.keys(appState.contacts).filter(id => 
                appState.contacts[id].name.toLowerCase().includes(query.toLowerCase()) ||
                appState.contacts[id].phone.toLowerCase().includes(query.toLowerCase())
            );

            if (filtered.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-light);">Контакты не найдены</div>';
                return;
            }

            container.innerHTML = filtered.map(contactId => {
                const contact = appState.contacts[contactId];
                const initials = contact.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2) || contact.name[0].toUpperCase();
                
                return `
                    <div class="contact-item-full" onclick="selectChatWithContact('${contactId}')">
                        <div class="contact-avatar-full">${initials}</div>
                        <div class="contact-info-full">
                            <div class="contact-name-full">${escapeHtml(contact.name)}</div>
                            <div class="contact-status-full">${contact.phone || 'Нет телефона'}</div>
                        </div>
                        <div class="contact-action" onclick="event.stopPropagation(); deleteContact('${contactId}')">🗑️</div>
                    </div>
                `;
            }).join('');
        }

        function selectChatWithContact(contactId) {
            const contact = appState.contacts[contactId];
            
            // Ищем чат с этим контактом
            let chatId = Object.keys(appState.chats).find(id => appState.chats[id].contactId === contactId);
            
            if (!chatId) {
                // Создаём новый чат
                chatId = 'chat_' + Date.now();
                const initials = contact.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2) || contact.name[0].toUpperCase();
                
                appState.chats[chatId] = {
                    id: chatId,
                    name: contact.name,
                    emoji: initials,
                    online: true,
                    unread: 0,
                    lastMessageTime: Date.now(),
                    contactId: contactId
                };
                appState.messages[chatId] = [];
                saveData();
                loadChats();
            }

            selectChat(chatId);
            closeContactsPanel();
        }

        function deleteContact(contactId) {
            showConfirmDialog('Удалить контакт?', () => {
                delete appState.contacts[contactId];
                saveData();
                loadContactsList();
                showToast('✅ Контакт удален', 'success');
            });
        }

        // ============= УЛУЧШЕННЫЙ ПОИСК =============
        function showSearchResults() {
            const query = appState.searchQuery.toLowerCase();
            const resultsPanel = document.getElementById('searchResultsPanel');
            const results = [];

            // Поиск в контактах
            if (appState.contacts) {
                Object.values(appState.contacts).forEach(contact => {
                    if (contact.name.toLowerCase().includes(query) || contact.phone.includes(query)) {
                        results.push({
                            type: 'contact',
                            name: contact.name,
                            id: contact.id,
                            preview: contact.phone || 'Нет телефона',
                            data: contact
                        });
                    }
                });
            }

            // Поиск в чатах
            Object.entries(appState.chats).forEach(([chatId, chat]) => {
                if (chat.name.toLowerCase().includes(query)) {
                    results.push({
                        type: 'chat',
                        name: chat.name,
                        id: chatId,
                        preview: 'Чат',
                        data: chat
                    });
                }
            });

            // Поиск в сообщениях
            Object.entries(appState.messages).forEach(([chatId, messages]) => {
                const chat = appState.chats[chatId];
                messages.forEach(msg => {
                    if (msg.text.toLowerCase().includes(query)) {
                        results.push({
                            type: 'message',
                            name: chat?.name || 'Неизвестный чат',
                            id: msg.id,
                            preview: msg.text.substring(0, 50),
                            chatId: chatId,
                            data: msg
                        });
                    }
                });
            });

            if (results.length === 0) {
                resultsPanel.innerHTML = '<div style="padding: 16px; text-align: center; color: var(--text-light);">Ничего не найдено</div>';
            } else {
                resultsPanel.innerHTML = results.slice(0, 10).map((result, index) => `
                    <div class="search-result-item" onclick="handleSearchResult('${result.type}', '${(result.chatId || result.id).replace(/'/g, "&apos;")}')">
                        <div class="search-result-type">${result.type === 'contact' ? '👥 Контакт' : result.type === 'message' ? '💬 Сообщение' : '💭 Чат'}</div>
                        <div class="search-result-text">${escapeHtml(result.name)}</div>
                        <div class="search-result-preview">${escapeHtml(result.preview)}</div>
                    </div>
                `).join('');
            }

            resultsPanel.classList.add('active');
        }

        function hideSearchResults() {
            document.getElementById('searchResultsPanel').classList.remove('active');
        }

        function handleSearchResult(type, id) {
            if (type === 'contact') {
                selectChatWithContact(id);
            } else if (type === 'chat' || type === 'message') {
                selectChat(id);
                document.getElementById('searchInput').value = '';
                appState.searchQuery = '';
                hideSearchResults();
                filterChats();
            }
        }

        // ============= ПРОФИЛИ ПОЛЬЗОВАТЕЛЕЙ =============
        function showUserProfile(chat) {
            const card = document.getElementById('userProfileCard');
            
            const initials = chat.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2) || chat.name[0].toUpperCase();
            
            document.getElementById('profileAvatar').textContent = chat.emoji || initials;
            document.getElementById('profileName').textContent = chat.name;
            document.getElementById('profileStatus').textContent = chat.online ? '🟢 Онлайн' : '⚫ Последний раз в сети';
            
            // Позиционируем в центре экрана
            card.style.left = 'calc(50% - 150px)';
            card.style.top = '50%';
            card.style.transform = 'translateY(-50%)';
            
            card.classList.add('active');
        }

        function closeUserProfile() {
            document.getElementById('userProfileCard').classList.remove('active');
        }

        function openSettings() {
            if (!appState.currentUser) return;
            document.getElementById('settingsPanel').classList.add('active');
            document.getElementById('settingsName').value = appState.currentUser.name;
            document.getElementById('settingsAvatar').value = appState.currentUser.avatar;
            document.getElementById('settingsPassword').value = '';
            renderFriendsList();
        }

        function closeSettings() {
            document.getElementById('settingsPanel').classList.remove('active');
        }

        function saveSettings() {
            if (!appState.currentUser) return;
            const name = document.getElementById('settingsName').value.trim();
            const avatar = document.getElementById('settingsAvatar').value.trim();
            const password = document.getElementById('settingsPassword').value;

            if (!name) {
                showToast('Имя не может быть пустым', 'error');
                return;
            }

            appState.currentUser.name = name;
            appState.currentUser.avatar = avatar || name.slice(0, 2).toUpperCase();
            if (password) {
                appState.currentUser.password = password;
            }
            document.getElementById('chatName').textContent = name;
            saveData();
            showToast('Настройки сохранены', 'success');
            closeSettings();
        }

        function addFriend() {
            const name = document.getElementById('friendName').value.trim();
            const tag = document.getElementById('friendTag').value.trim();

            if (!name || !tag) {
                showToast('Введите имя и тег друга', 'error');
                return;
            }

            const friendId = 'friend_' + Date.now();
            appState.friends[friendId] = {
                id: friendId,
                name,
                tag,
                addedAt: Date.now()
            };

            // Создаем чат с другом сразу
            const chatId = 'chat_' + Date.now();
            const initials = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2) || name[0].toUpperCase();
            appState.chats[chatId] = {
                id: chatId,
                name: name,
                emoji: initials,
                online: true,
                unread: 0,
                lastMessageTime: Date.now(),
                friendId: friendId
            };
            appState.messages[chatId] = [];

            document.getElementById('friendName').value = '';
            document.getElementById('friendTag').value = '';
            saveData();
            renderFriendsList();
            loadChats();
            selectChat(chatId);
            showToast(`✅ Друг ${name} добавлен и чат создан`, 'success');
        }

        function renderFriendsList() {
            const container = document.getElementById('friendsList');
            const entries = Object.values(appState.friends || {});
            if (entries.length === 0) {
                container.innerHTML = '<div style="color: var(--text-light);">Список друзей пуст</div>';
                return;
            }
            container.innerHTML = entries.map(friend => `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid var(--border);">
                    <div>
                        <div style="font-weight: 600;">${escapeHtml(friend.name)}</div>
                        <div style="font-size: 12px; color: var(--text-light);">${escapeHtml(friend.tag)}</div>
                    </div>
                    <button style="background: #e74c3c; color: white; border: none; border-radius: 6px; padding: 4px 8px; cursor: pointer;" onclick="removeFriend('${friend.id}')">Удалить</button>
                </div>
            `).join('');
        }

        function removeFriend(friendId) {
            delete appState.friends[friendId];
            saveData();
            renderFriendsList();
            showToast('Друг удалён', 'info');
        }

        function logoutUser() {
            appState.currentUser = null;
            appState.currentChat = null;
            localStorage.removeItem('messenger_current_user');
            hideAuthScreen();
            showAuthScreen();
            showToast('Вы вышли из аккаунта', 'info');
        }

        // ============= ЗАПУСК =============
        init();
    </script>
</body>
</html>
